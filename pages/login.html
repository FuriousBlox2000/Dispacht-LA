<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Sécurisé - Connexion</title>

    <!-- Feuille de style DSFR -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.1/dist/dsfr.min.css">
    
<style>
    /* ✅ Correction du logo */
    .fr-header__brand {
            display: flex;
            align-items: center;
            justify-content: start;
            padding: 20px; /* Ajoute plus d'espace en haut */
            margin-left: 20px; /* Déplace vers la gauche */
        }

    .fr-logo {
            height: 80px; /* Taille du logo */
            width: auto;
            margin-right: 15px;
        }

    .fr-logo-text {
            font-size: 20px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* ✅ Centrage du titre */
        h1 {
            text-align: center;
            margin-top: 20px;
        }

        /* ✅ Conteneur du formulaire */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            margin-top: 30px;
        }

        /* ✅ Visibilité du formulaire par défaut */
        .fr-tabs__panel {
            display: none;
        }

        .fr-tabs__panel.active {
            display: block;
        }

        /* ✅ Suppression des espaces vides */
        .fr-footer {
            margin-top: 50px;
        }

        /* ✅ Responsive */
        @media (max-width: 768px) {
            .fr-container {
                padding: 10px;
            }

            .fr-tabs__list {
                display: flex;
                flex-direction: column;
            }

            .fr-btn {
                width: 100%;
            }

            .fr-logo {
                height: 60px; /* Ajustement du logo en mobile */
            }

            .fr-logo-text {
                font-size: 16px;
            }
        }

        /* ✅ S'assurer que le formulaire est bien visible */
        form {
                display: block !important;  /* Force l'affichage */
                opacity: 1;
                visibility: visible;
    		position: relative;  /* Évite qu'il soit en absolute hors écran */
    		margin: 20px auto;  /* Centre le formulaire */
    		max-width: 400px;  /* Taille raisonnable */
    		padding: 20px;
    		background: white;
    		border-radius: 10px;
    		box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
	}

		/* ✅ Corriger l’alignement si le formulaire est mal placé */
		.container {
    		display: flex;
    		justify-content: center; /* Centre horizontalement */
    		align-items: center; /* Centre verticalement si nécessaire */
    		min-height: 50vh; /* Ajuste la hauteur */
	}


    </style>
</head>

<body>
    <header class="fr-header">
        <div class="fr-container">
            <div class="fr-header__body">
                <div class="fr-header__brand">
                    <img src="https://www.saintmartindelabrasque.com/image.php?width=1200&height=600&image=/img/Actualit%C3%A9s/Ministere%20interieur.jpg" alt="République Française" class="fr-logo">
                    <p class="fr-logo-text">République Française</p>
                </div>
            </div>
        </div>
    </header>
    
    <main class="fr-container">
        <h1>Connexion au Portail Sécurisé</h1>

        <div class="login-container">
            <div class="fr-tabs">
                <ul class="fr-tabs__list" role="tablist">
                    <li role="presentation">
                        <button class="fr-tabs__tab active" role="tab" data-target="carte-tab">Carte Professionnelle</button>
                    </li>
                    <li role="presentation">
                        <button class="fr-tabs__tab" role="tab" data-target="identifiant-tab">Identifiant / Mot de passe</button>
                    </li>
                </ul>
                
                <!-- Connexion avec carte professionnelle -->
                <div class="fr-tabs__panel active" id="carte-tab" role="tabpanel">
                    <p>Veuillez insérer votre carte professionnelle dans le lecteur.</p>
                    <button class="fr-btn">Se connecter avec la carte</button>
                </div>

                <!-- Connexion avec identifiant / mot de passe -->
                <div class="fr-tabs__panel" id="identifiant-tab" role="tabpanel">
                    <form id="login-form">
                        <label class="fr-label" for="identifiant">Identifiant</label>
                        <input type="text" id="identifiant" class="fr-input" required>

                        <label class="fr-label" for="password">Mot de passe</label>
                        <input type="password" id="password" class="fr-input" required>

                        <button type="submit" class="fr-btn fr-mt-3w">Se connecter</button>
                    </form>
                </div>
		<script src="../scripts/auth.js"></script> <!-- ✅ Ajout du script de connexion -->
            </div>
        </div>
    </main>
    
    <footer class="fr-footer">
        <div class="fr-container">
            <p>© République Française - Tous droits réservés</p>
        </div>
    </footer>
    
    <!-- Script DSFR -->
    <script defer type="module" src="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.9.1/dist/dsfr.module.min.js"></script>
    
    <!-- Script pour gérer les onglets -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const tabs = document.querySelectorAll(".fr-tabs__tab");
            const panels = document.querySelectorAll(".fr-tabs__panel");

            function switchTab(targetId) {
                tabs.forEach(tab => tab.classList.remove("active"));
                panels.forEach(panel => panel.classList.remove("active"));

                document.querySelector(`[data-target="${targetId}"]`).classList.add("active");
                document.getElementById(targetId).classList.add("active");
            }

            tabs.forEach(tab => {
                tab.addEventListener("click", function () {
                    switchTab(this.getAttribute("data-target"));
                });
            });

            switchTab("carte-tab");
        });
    </script>
    <script src="../scripts/main.js"></script>
</body>
</html>
